<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ec4899">
    <title>Michelline — Invitations digitales &amp; impressions</title>
    <meta name="description" content="Michelline — Invitations digitales et impressions physiques. RSVP, QR, WhatsApp. RDC &amp; Afrique.">
    <meta property="og:title" content="Michelline — Invitations digital &amp; impressions">
    <meta property="og:description" content="RSVP mobile, QR code, WhatsApp. Digital et cartes imprimées. RDC &amp; Afrique.">
    <meta property="og:image" content="https://alphagiven7-collab.github.io/invitation_mariage/assets/images/previews/preview-accueil.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/michelline-brand.css?v=47">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: "Montserrat", system-ui, sans-serif;
            background: linear-gradient(160deg, #fdf2f8 0%, #eef4ff 50%, #fafafa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #1f2937;
        }
        .hub {
            width: 100%;
            max-width: 22rem;
            background: rgba(255,255,255,0.97);
            border-radius: 1.25rem;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 20px 50px rgba(17,24,39,0.12);
            border: 1px solid rgba(236,72,153,0.15);
        }
        .hub-visual {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1200 / 630;
            object-fit: cover;
            border-bottom: 1px solid rgba(236,72,153,0.12);
        }
        .hub-body { padding: 1.25rem 1.15rem 1.5rem; }
        .hub-desc {
            font-size: 0.8125rem;
            color: #6b7280;
            line-height: 1.55;
            margin: 0.85rem 0 1.1rem;
        }
        .hub-desc strong { color: #374151; }
        .hub-actions { display: flex; flex-direction: column; gap: 0.6rem; }
        .hub-btn {
            display: block;
            padding: 0.88rem 1rem;
            border-radius: 9999px;
            font-size: 0.6875rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            text-align: center;
        }
        .hub-btn--primary {
            background: linear-gradient(to right, #f43f5e, #db2777);
            color: #fff;
        }
        .hub-btn--secondary {
            background: #fff;
            color: #374151;
            border: 1px solid rgba(17,24,39,0.12);
        }
        .hub-note {
            margin-top: 0.85rem;
            font-size: 0.625rem;
            color: #9ca3af;
            line-height: 1.45;
        }
    </style>
    <script>
        (function () {
            var q = new URLSearchParams(window.location.search);
            if (q.get("go") === "invitation") {
                window.location.replace("./pages/invitation.html" + window.location.search.replace(/go=invitation&?/, "").replace(/^&/, "?"));
            }
            if (q.get("go") === "offres") {
                window.location.replace("./pages/offres.html");
            }
        })();
    </script>
</head>
<body>
    <div class="hub">
        <img
            class="hub-visual"
            src="./assets/images/michelline-hero-envelopes.png?v=47"
            alt="Michelline — enveloppes et invitations, RDC et Afrique"
            width="1200"
            height="630"
            loading="eager"
        >
        <div class="hub-body">
            <div class="michelline-logo michelline-logo--light michelline-logo--calligraphy-only" aria-label="Michelline">
                <span class="michelline-calligraphy">Michelline</span>
            </div>
            <p class="hub-desc">Invitations <strong>digitales</strong> et <strong>impressions physiques</strong> — RSVP, QR code, modèles imprimés · RDC &amp; Afrique.</p>
            <div class="hub-actions">
                <a class="hub-btn hub-btn--primary" href="./pages/offres.html?v=47">Voir les offres &amp; tarifs</a>
                <a class="hub-btn hub-btn--secondary" href="./pages/partager.html?v=47">Kit promotion (QR, visuels)</a>
                <a class="hub-btn hub-btn--secondary" href="./pages/invitation.html?event=yanick-keren&amp;v=42">Démo invitation</a>
            </div>
            <p class="hub-note">Lien court : …/o.html · Devis WhatsApp +243 845 370 370</p>
        </div>
    </div>
</body>
</html>
