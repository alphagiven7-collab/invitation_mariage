<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4caf50">
    <title>Michelline — Invitations digitales</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Montserrat", system-ui, sans-serif;
            background: linear-gradient(160deg, #fdf2f8 0%, #eef4ff 50%, #fafafa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            color: #1f2937;
        }
        .hub {
            width: 100%;
            max-width: 22rem;
            background: rgba(255,255,255,0.95);
            border-radius: 1.25rem;
            padding: 1.75rem 1.25rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(17,24,39,0.1);
            border: 1px solid rgba(236,72,153,0.15);
        }
        .hub-brand {
            font-family: "Great Vibes", cursive;
            font-size: 2.5rem;
            margin: 0 0 0.25rem;
            line-height: 1.1;
        }
        .hub-tag {
            font-size: 0.625rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #9ca3af;
            margin: 0 0 1.25rem;
        }
        .hub p {
            font-size: 0.8125rem;
            color: #6b7280;
            line-height: 1.55;
            margin: 0 0 1.25rem;
        }
        .hub-actions {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }
        .hub-btn {
            display: block;
            padding: 0.9rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            text-align: center;
        }
        .hub-btn--primary {
            background: linear-gradient(to right, #f43f5e, #db2777);
            color: #fff;
        }
        .hub-btn--secondary {
            background: #fff;
            color: #374151;
            border: 1px solid rgba(17,24,39,0.12);
        }
        .hub-note {
            margin-top: 1rem;
            font-size: 0.625rem;
            color: #9ca3af;
        }
    </style>
    <script>
        (function () {
            var q = new URLSearchParams(window.location.search);
            if (q.get("go") === "invitation") {
                window.location.replace("./pages/invitation.html" + window.location.search.replace(/go=invitation&?/, "").replace(/^&/, "?"));
            }
            if (q.get("go") === "offres") {
                window.location.replace("./pages/offres.html");
            }
        })();
    </script>
</head>
<body>
    <div class="hub">
        <h1 class="hub-brand">Michelline</h1>
        <p class="hub-tag">RDC &amp; Afrique</p>
        <p>Invitations digitales premium — RSVP, QR code, WhatsApp.</p>
        <div class="hub-actions">
            <a class="hub-btn hub-btn--primary" href="./pages/offres.html?v=34">Voir les offres &amp; tarifs</a>
            <a class="hub-btn hub-btn--secondary" href="./pages/invitation.html?event=yanick-keren&amp;v=34">Démo invitation (Josue &amp; Divine)</a>
        </div>
        <p class="hub-note">Tarifs : 50 $ · 100 $ · 150 $</p>
    </div>
</body>
</html>
